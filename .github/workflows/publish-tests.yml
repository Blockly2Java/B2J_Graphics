name: Publish Tests Package

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish_github:
    name: Publish to Github Packages
    runs-on: ubuntu-latest
    env:
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_PACKAGES_USERNAME: ${{ secrets.GH_PACKAGES_USERNAME }}
      GH_TOKEN: ${{ secrets.GH_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          server-id: github
          server-username: GH_PACKAGES_USERNAME
          server-password: GH_TOKEN

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Update version in pom.xml
        run: mvn -B versions:set -DnewVersion=${{ steps.version.outputs.version }} -DgenerateBackupPoms=false

      - name: Publish to GitHub Packages
        run: mvn -B -DskipTests clean deploy



        
  publish_maven:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17' # Adjust to your Java version if needed
          distribution: 'temurin'
          server-id: central 
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: ${{ secrets.GPG_PASSPHRASE }}

          # --- DIAGNOSTIC STEP ---
      - name: Verify Secrets are Loaded
        env:
          U: ${{ secrets.OSSRH_USER }}
          P: ${{ secrets.OSSRH_TOKEN }}
        run: |
          echo "Username length: ${#U}"
          echo "Token length: ${#P}"
          if [ -z "$U" ] || [ -z "$P" ]; then
            echo "::error::Secrets are empty! Check your repository settings."
            exit 1
          fi


      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Update version in pom.xml
        run: mvn -B versions:set -DnewVersion=${{ steps.version.outputs.version }} -DgenerateBackupPoms=false

      - name: Publish package
        env:
          # Mapping your specific GitHub Secrets to the variables Maven expects
          OSSRH_USER: ${{ secrets.OSSRH_USER }} 
          OSSRH_TOKEN: ${{ secrets.OSSRH_TOKEN }} 
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          # 2. Run the deploy command, passing the GPG passphrase directly
          mvn clean deploy -B -DskipTests -Dgpg.passphrase="${GPG_PASSPHRASE}"
